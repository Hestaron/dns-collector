[dns]
record_types = ["A", "AAAA", "MX", "TXT", "NS", "CNAME"]
timeout = 5.0  # seconds per DNS query
nameservers = ["1.1.1.1", "8.8.8.8"]  # explicit resolvers for reproducibility

[dns.domains]
targets = [
    "example.com",
    "microsoft.com",
    "instagram.com",
    "cloudflare.com",
    "wikipedia.org",
    "github.com",
    "google.com",
    "apple.com",
    "darktrace.com",
    "amazon.com"
]
