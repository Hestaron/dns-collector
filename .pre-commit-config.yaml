repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: interrogate
        name: interrogate (docstring coverage)
        entry: uv run interrogate -v
        language: system
        types: [python]
        pass_filenames: false
